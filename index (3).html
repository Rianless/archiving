<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아카이빙 — 웹소설 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --surface: #f2f0eb;
  --card: #ffffff;
  --border: #e8e3d8;
  --text: #1a1814;
  --muted: #7a7468;
  --dim: #c2bdb2;
  --accent: #c0392b;
  --sans: 'Noto Sans KR', sans-serif;
  --serif: 'Noto Serif KR', serif;
  --naver: #03c75a;
  --kakao: #f0a500;
  --joara: #e85d26;
  --ridi: #1a7cd9;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.7;
}

/* ── HEADER ── */
header {
  background: var(--bg);
  border-bottom: 2px solid var(--text);
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky; top: 0; z-index: 50;
}

.logo {
  font-family: var(--serif);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.header-nav a {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  font-weight: 400;
  transition: color 0.15s;
}

.header-nav a:hover { color: var(--text); }

.search-box {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  border: 1px solid var(--border);
  padding: 0.3rem 0.8rem;
  background: var(--surface);
}

.search-box input {
  background: none; border: none; outline: none;
  font-family: var(--sans); font-size: 0.78rem; font-weight: 300;
  color: var(--text); width: 160px;
}

.search-box input::placeholder { color: var(--dim); }

/* ── TABS ── */
.tab-section {
  border-bottom: 1px solid var(--border);
  background: var(--bg);
}

.tab-inner {
  max-width: 1160px;
  margin: 0 auto;
  padding: 0 2.5rem;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.tab-inner::-webkit-scrollbar { display: none; }

.tab {
  padding: 0.9rem 1.5rem;
  font-size: 0.78rem;
  font-weight: 400;
  letter-spacing: 0.05em;
  color: var(--muted);
  cursor: pointer;
  border: none; background: none;
  border-bottom: 2px solid transparent;
  font-family: var(--sans);
  white-space: nowrap;
  position: relative; top: 1px;
  transition: color 0.15s;
  display: flex; align-items: center; gap: 0.4rem;
}

.tab:hover { color: var(--text); }
.tab.active { color: var(--text); border-bottom-color: var(--text); font-weight: 500; }

.tab[data-p="네이버시리즈"].active { border-bottom-color: var(--naver); color: var(--naver); }
.tab[data-p="카카오페이지"].active { border-bottom-color: var(--kakao); color: var(--kakao); }
.tab[data-p="조아라"].active { border-bottom-color: var(--joara); color: var(--joara); }
.tab[data-p="리디북스"].active { border-bottom-color: var(--ridi); color: var(--ridi); }

.tab-dot { width: 5px; height: 5px; border-radius: 50%; }
.tab[data-p="네이버시리즈"] .tab-dot { background: var(--naver); }
.tab[data-p="카카오페이지"] .tab-dot { background: var(--kakao); }
.tab[data-p="조아라"] .tab-dot { background: var(--joara); }
.tab[data-p="리디북스"] .tab-dot { background: var(--ridi); }

/* ── FILTER BAR ── */
.filter-bar {
  max-width: 1160px;
  margin: 0 auto;
  padding: 1rem 2.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
}

.genre-btn {
  font-size: 0.7rem; letter-spacing: 0.06em;
  color: var(--muted); border: 1px solid var(--border);
  background: none; padding: 0.25rem 0.75rem; cursor: pointer;
  font-family: var(--sans); transition: all 0.15s; border-radius: 2px;
}
.genre-btn:hover { color: var(--text); border-color: var(--text); }
.genre-btn.active { color: var(--bg); background: var(--text); border-color: var(--text); }

.sort-select {
  margin-left: auto;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--muted); font-family: var(--sans); font-size: 0.72rem;
  padding: 0.25rem 0.65rem; outline: none; cursor: pointer;
}

/* ── MAIN LAYOUT ── */
.main {
  max-width: 1160px;
  margin: 0 auto;
  padding: 2rem 2.5rem 5rem;
  display: grid;
  grid-template-columns: 1fr 280px;
  gap: 3rem;
  align-items: start;
}

/* ── NOVEL GRID ── */
.novel-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.novel-card {
  background: var(--card);
  padding: 1.4rem;
  cursor: pointer;
  transition: background 0.12s;
  display: flex; flex-direction: column; gap: 0.4rem;
}
.novel-card:hover { background: var(--surface); }

.card-platform {
  font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.14rem 0.45rem; font-weight: 500; border-radius: 2px;
  display: inline-block;
}
.p-naver { background: rgba(3,199,90,0.1); color: var(--naver); }
.p-kakao { background: rgba(240,165,0,0.1); color: var(--kakao); }
.p-joara { background: rgba(232,93,38,0.1); color: var(--joara); }
.p-ridi { background: rgba(26,124,217,0.1); color: var(--ridi); }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.3rem; }
.card-score { font-size: 0.72rem; color: var(--dim); letter-spacing: 0.05em; }
.card-title { font-family: var(--serif); font-size: 0.98rem; font-weight: 600; color: var(--text); line-height: 1.3; }
.card-author { font-size: 0.68rem; color: var(--muted); }
.card-desc {
  font-size: 0.76rem; line-height: 1.75; color: var(--muted);
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  margin-top: 0.3rem;
}
.card-tags { display: flex; flex-wrap: wrap; gap: 0.25rem; margin-top: auto; padding-top: 0.7rem; }
.card-tag { font-size: 0.58rem; color: var(--dim); border: 1px solid var(--border); padding: 0.1rem 0.45rem; border-radius: 2px; }

.empty-state { grid-column: 1/-1; padding: 5rem; text-align: center; color: var(--muted); font-size: 0.85rem; }

/* ── SIDEBAR ── */
.sidebar { display: flex; flex-direction: column; gap: 2rem; }

.sidebar-block {
  border: 1px solid var(--border);
  padding: 1.4rem;
}

.sidebar-title {
  font-size: 0.68rem; letter-spacing: 0.15em; text-transform: uppercase;
  color: var(--muted); font-weight: 400; margin-bottom: 1rem;
  padding-bottom: 0.7rem; border-bottom: 1px solid var(--border);
}

/* AI 추천 */
.ai-form { display: flex; flex-direction: column; gap: 0.8rem; }
.ai-input, .ai-select, .ai-textarea {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: var(--sans); font-size: 0.78rem; font-weight: 300;
  padding: 0.6rem 0.8rem; outline: none; transition: border-color 0.15s;
}
.ai-input:focus, .ai-select:focus, .ai-textarea:focus { border-color: var(--text); }
.ai-textarea { resize: vertical; min-height: 70px; }
.ai-input::placeholder, .ai-textarea::placeholder { color: var(--dim); }

.ai-label { font-size: 0.65rem; letter-spacing: 0.1em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.2rem; display: block; }

.ai-btn {
  width: 100%; background: var(--text); color: var(--bg);
  border: none; padding: 0.75rem; font-family: var(--sans); font-size: 0.72rem;
  letter-spacing: 0.1em; text-transform: uppercase; font-weight: 400;
  cursor: pointer; transition: background 0.15s;
}
.ai-btn:hover:not(:disabled) { background: var(--accent); }
.ai-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.ai-result { margin-top: 0.5rem; min-height: 60px; }
.ai-result-item { padding: 0.7rem 0; border-bottom: 1px solid var(--border); }
.ai-result-item:last-child { border-bottom: none; }
.ai-result-title { font-family: var(--serif); font-size: 0.85rem; font-weight: 600; color: var(--text); }
.ai-result-reason { font-size: 0.72rem; color: var(--muted); line-height: 1.7; margin-top: 0.25rem; }

.loading { display: flex; gap: 4px; justify-content: center; padding: 1rem 0; }
.loading span { width: 5px; height: 5px; border-radius: 50%; background: var(--dim); animation: pulse 1.2s ease-in-out infinite; }
.loading span:nth-child(2) { animation-delay: 0.2s; }
.loading span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

/* 리뷰 최신 목록 */
.review-item {
  padding: 0.8rem 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: opacity 0.15s;
}
.review-item:last-child { border-bottom: none; }
.review-item:hover { opacity: 0.65; }
.review-item-title { font-family: var(--serif); font-size: 0.85rem; font-weight: 600; color: var(--text); line-height: 1.3; }
.review-item-meta { font-size: 0.65rem; color: var(--muted); margin-top: 0.2rem; }

/* ── MODAL ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(26,24,20,0.55); z-index: 100;
  align-items: center; justify-content: center;
  padding: 1.5rem; backdrop-filter: blur(4px);
}
.overlay.open { display: flex; }
.modal {
  background: var(--card); border: 1px solid var(--border);
  max-width: 580px; width: 100%; max-height: 85vh; overflow-y: auto;
  padding: 2.5rem; position: relative;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}
.modal-close {
  position: absolute; top: 1.2rem; right: 1.4rem;
  background: none; border: none; color: var(--muted); font-size: 1.2rem; cursor: pointer;
}
.modal-platform { margin-bottom: 0.8rem; }
.modal-title { font-family: var(--serif); font-size: 1.7rem; font-weight: 600; color: var(--text); line-height: 1.2; margin-bottom: 0.5rem; }
.modal-meta { display: flex; gap: 1.2rem; font-size: 0.74rem; color: var(--muted); flex-wrap: wrap; margin-bottom: 1.4rem; }
.modal-hr { height: 1px; background: var(--border); margin: 1.2rem 0; }
.modal-body { font-family: var(--serif); font-size: 0.88rem; line-height: 2; color: var(--muted); white-space: pre-line; }
.modal-link {
  display: inline-flex; align-items: center; gap: 0.4rem;
  font-size: 0.72rem; letter-spacing: 0.08em; color: var(--text);
  border: 1px solid var(--border); padding: 0.5rem 1rem;
  text-decoration: none; margin-top: 1.2rem;
  transition: border-color 0.15s, background 0.15s;
}
.modal-link:hover { border-color: var(--text); background: var(--surface); }

/* ── REVIEW SECTION ── */
#reviews-section {
  max-width: 1160px; margin: 0 auto;
  padding: 0 2.5rem 6rem;
}

.section-heading {
  display: flex; align-items: baseline; gap: 1rem;
  border-top: 2px solid var(--text);
  padding-top: 1.2rem; margin-bottom: 2rem;
}
.section-heading h2 { font-family: var(--serif); font-size: 1.5rem; font-weight: 600; }
.section-count { font-size: 0.72rem; color: var(--muted); }

.review-grid-full {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1px; background: var(--border); border: 1px solid var(--border);
}

.review-card-full {
  background: var(--card); padding: 1.8rem;
  cursor: pointer; transition: background 0.12s;
}
.review-card-full:hover { background: var(--surface); }

.rcf-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; }
.rcf-genre { font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.rcf-score { font-size: 0.75rem; color: var(--dim); }
.rcf-title { font-family: var(--serif); font-size: 1.05rem; font-weight: 600; color: var(--text); line-height: 1.3; margin-bottom: 0.25rem; }
.rcf-author { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.8rem; }
.rcf-excerpt {
  font-size: 0.8rem; line-height: 1.8; color: var(--muted);
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
}
.rcf-platform { font-size: 0.6rem; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; margin-top: 0.8rem; }

/* ── MOBILE ── */
@media (max-width: 900px) {
  .main { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}

@media (max-width: 640px) {
  header { padding: 0 1.2rem; }
  .header-nav { display: none; }
  .tab-inner, .filter-bar, .main, #reviews-section { padding-left: 1.2rem; padding-right: 1.2rem; }
  .modal { padding: 1.8rem 1.2rem; }
  .review-grid-full { grid-template-columns: 1fr; }
}

@keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.novel-card { animation: fadeIn 0.2s ease both; }
</style>
</head>
<body>

<header>
  <div class="logo">아카이빙</div>
  <nav class="header-nav">
    <a href="#top">추천</a>
    <a href="#reviews-section">리뷰</a>
  </nav>
  <div class="search-box">
    <span style="color:var(--dim);font-size:0.8rem">🔍</span>
    <input type="text" id="searchInput" placeholder="작품명 검색..." oninput="render()">
  </div>
</header>

<!-- PLATFORM TABS -->
<div class="tab-section" id="top">
  <div class="tab-inner">
    <button class="tab active" data-p="전체" onclick="setP('전체',this)">전체</button>
    <button class="tab" data-p="네이버시리즈" onclick="setP('네이버시리즈',this)"><span class="tab-dot"></span>네이버시리즈</button>
    <button class="tab" data-p="카카오페이지" onclick="setP('카카오페이지',this)"><span class="tab-dot"></span>카카오페이지</button>
    <button class="tab" data-p="조아라" onclick="setP('조아라',this)"><span class="tab-dot"></span>조아라</button>
    <button class="tab" data-p="리디북스" onclick="setP('리디북스',this)"><span class="tab-dot"></span>리디북스</button>
  </div>
</div>

<!-- FILTER -->
<div class="filter-bar">
  <button class="genre-btn active" onclick="setG('전체',this)">전체</button>
  <button class="genre-btn" onclick="setG('로맨스판타지',this)">로맨스판타지</button>
  <button class="genre-btn" onclick="setG('현대로맨스',this)">현대로맨스</button>
  <button class="genre-btn" onclick="setG('판타지',this)">판타지</button>
  <button class="genre-btn" onclick="setG('BL',this)">BL</button>
  <button class="genre-btn" onclick="setG('패러디',this)">패러디</button>
  <button class="genre-btn" onclick="setG('대체역사',this)">대체역사</button>
  <select class="sort-select" id="sortSel" onchange="render()">
    <option value="default">기본순</option>
    <option value="score">평점순</option>
    <option value="title">제목순</option>
  </select>
</div>

<!-- MAIN -->
<div class="main">
  <div>
    <div class="novel-grid" id="novelGrid"></div>
  </div>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <!-- AI 추천 -->
    <div class="sidebar-block">
      <div class="sidebar-title">취향으로 추천받기</div>
      <div class="ai-form">
        <div>
          <label class="ai-label">선호 장르</label>
          <select class="ai-select" id="aiGenre">
            <option value="">선택</option>
            <option>로맨스 판타지</option>
            <option>현대 로맨스</option>
            <option>판타지 (헌터물·회귀물)</option>
            <option>BL</option>
            <option>패러디</option>
            <option>대체역사</option>
            <option>무협</option>
            <option>장르 불문</option>
          </select>
        </div>
        <div>
          <label class="ai-label">키워드 / 취향</label>
          <textarea class="ai-textarea" id="aiKeyword" placeholder="예: 빙의물 좋아함, 착각계, 먼치킨 싫음, 달달한 거, BL 일공다수..."></textarea>
        </div>
        <button class="ai-btn" id="aiBtn" onclick="getAI()">추천받기</button>
      </div>
      <div class="ai-result" id="aiResult"></div>
    </div>

    <!-- 최신 리뷰 -->
    <div class="sidebar-block">
      <div class="sidebar-title">최신 리뷰</div>
      <div id="latestReviews"></div>
    </div>
  </aside>
</div>

<!-- 리뷰 섹션 -->
<div id="reviews-section">
  <div class="section-heading">
    <h2>리뷰 아카이브</h2>
    <span class="section-count" id="reviewCount"></span>
  </div>
  <div class="review-grid-full" id="reviewGrid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <div class="modal-platform" id="mPlat"></div>
    <h2 class="modal-title" id="mTitle"></h2>
    <div class="modal-meta" id="mMeta"></div>
    <div class="modal-hr"></div>
    <div class="modal-body" id="mBody"></div>
    <div class="card-tags" id="mTags" style="margin-top:1.2rem"></div>
    <a class="modal-link" id="mLink" href="#" target="_blank" rel="noopener noreferrer"></a>
  </div>
</div>

<script>
// ════════════════════════════════════════════
//  추천 작품 데이터
// ════════════════════════════════════════════
const novels = [

  },
  {
    id:3, title:"전지적 독자 시점", author:"싱숑",

// ════════════════════════════════════════════

const pBadge = {
  '네이버시리즈': '<span class="card-platform p-naver">네이버시리즈</span>',
  '카카오페이지': '<span class="card-platform p-kakao">카카오페이지</span>',
  '조아라':       '<span class="card-platform p-joara">조아라</span>',
  '리디북스':     '<span class="card-platform p-ridi">리디북스</span>',
};

const stars = n => '★'.repeat(n) + '☆'.repeat(5-n);

let curP = '전체', curG = '전체';

function setP(p, btn) {
  curP = p;
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setG(g, btn) {
  curG = g;
  document.querySelectorAll('.genre-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const sort = document.getElementById('sortSel').value;

  let list = novels.filter(n => {
    return (curP === '전체' || n.platform === curP)
      && (curG === '전체' || n.genre === curG)
      && (!q || n.title.includes(q) || n.author.includes(q) || n.tags.some(t => t.includes(q)));
  });

  if (sort === 'score') list = [...list].sort((a,b) => b.score - a.score);
  if (sort === 'title') list = [...list].sort((a,b) => a.title.localeCompare(b.title,'ko'));

  const grid = document.getElementById('novelGrid');
  if (!list.length) {
    grid.innerHTML = '<div class="empty-state">해당하는 작품이 없습니다</div>';
    return;
  }

  grid.innerHTML = list.map((n,i) => `
    <div class="novel-card" style="animation-delay:${i*0.03}s" onclick="openNovelModal(${n.id})">
      <div class="card-header">
        ${pBadge[n.platform]||''}
        <span class="card-score">${stars(n.score)}</span>
      </div>
      <div class="card-title">${n.title}</div>
      <div class="card-author">${n.author}</div>
      <div class="card-desc">${n.desc.split('\n')[0]}</div>
      <div class="card-tags">${n.tags.map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function renderReviews() {
  const grid = document.getElementById('reviewGrid');
  document.getElementById('reviewCount').textContent = `${reviews.length}편`;
  grid.innerHTML = reviews.map(r => `
    <div class="review-card-full" onclick="openReviewModal(${r.id})">
      <div class="rcf-head">
        <span class="rcf-genre">${r.genre} · ${r.platform}</span>
      </div>
      <div class="rcf-title">${r.title}</div>
      <div class="rcf-author">${r.author}</div>
      <div class="rcf-excerpt">${r.excerpt}</div>
      <div class="rcf-platform">${r.tags.map(t=>`#${t}`).join(' ')}</div>
    </div>
  `).join('');

  // sidebar latest
  const latest = document.getElementById('latestReviews');
  latest.innerHTML = reviews.slice(0,4).map(r => `
    <div class="review-item" onclick="openReviewModal(${r.id})">
      <div class="review-item-title">${r.title}</div>
      <div class="review-item-meta">${r.genre} · ${r.platform}</div>
    </div>
  `).join('');
}

function openNovelModal(id) {
  const n = novels.find(x => x.id === id);
  if (!n) return;
  document.getElementById('mPlat').innerHTML = pBadge[n.platform]||'';
  document.getElementById('mTitle').textContent = n.title;
  document.getElementById('mMeta').innerHTML = `<span>${n.author}</span><span>${stars(n.score)}</span><span style="color:var(--dim)">${n.genre}</span>`;
  document.getElementById('mBody').textContent = n.desc;
  document.getElementById('mTags').innerHTML = n.tags.map(t=>`<span class="card-tag">${t}</span>`).join('');
  const lnk = document.getElementById('mLink');
  lnk.href = n.link; lnk.textContent = `${n.platform}에서 보기 →`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openReviewModal(id) {
  const r = reviews.find(x => x.id === id);
  if (!r) return;
  document.getElementById('mPlat').innerHTML = pBadge[r.platform]||`<span style="font-size:0.65rem;color:var(--muted)">${r.platform}</span>`;
  document.getElementById('mTitle').textContent = r.title;
  document.getElementById('mMeta').innerHTML = `<span>${r.author}</span><span style="color:var(--dim)">${r.genre}</span>`;
  document.getElementById('mBody').textContent = r.fullReview;
  document.getElementById('mTags').innerHTML = r.tags.map(t=>`<span class="card-tag">#${t}</span>`).join('');
  const lnk = document.getElementById('mLink');
  lnk.href = r.link; lnk.textContent = `${r.platform}에서 보기 →`;
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow=''; }

// AI 추천
async function getAI() {
  const genre = document.getElementById('aiGenre').value;
  const keyword = document.getElementById('aiKeyword').value;
  if (!genre && !keyword) { alert('장르나 키워드를 입력해주세요!'); return; }

  const btn = document.getElementById('aiBtn');
  const result = document.getElementById('aiResult');
  btn.disabled = true;
  result.innerHTML = '<div class="loading"><span></span><span></span><span></span></div>';

  const prompt = `당신은 한국 웹소설 전문 큐레이터입니다.
독자 취향: 선호 장르 = ${genre||'무관'}, 키워드/취향 = ${keyword||'없음'}
이 취향에 맞는 웹소설 3편을 추천해주세요.
마크다운 없이 순수 JSON만 반환:
{"list":[{"title":"작품명","author":"작가명","platform":"플랫폼명","reason":"추천 이유 1-2문장"},{"title":"","author":"","platform":"","reason":""},{"title":"","author":"","platform":"","reason":""}]}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:800,
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const text = data.content.map(i=>i.text||'').join('');
    const clean = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(clean);
    result.innerHTML = parsed.list.map(r=>`
      <div class="ai-result-item">
        <div class="ai-result-title">${r.title} <span style="font-weight:300;font-size:0.72rem;color:var(--dim)">— ${r.author} · ${r.platform}</span></div>
        <div class="ai-result-reason">${r.reason}</div>
      </div>
    `).join('');
  } catch {
    result.innerHTML = '<div style="font-size:0.75rem;color:var(--dim);padding:0.5rem 0">잠시 후 다시 시도해주세요.</div>';
  }
  btn.disabled = false;
}

render();
renderReviews();
</script>
