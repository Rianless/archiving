<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아카이빙 — 웹소설 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --surface: #f2f0eb;
  --card: #ffffff;
  --border: #e8e3d8;
  --text: #1a1814;
  --muted: #7a7468;
  --dim: #c2bdb2;
  --accent: #c0392b;
  --sans: 'Noto Sans KR', sans-serif;
  --serif: 'Noto Serif KR', serif;
  --naver: #03c75a;
  --kakao: #f0a500;
  --joara: #e85d26;
  --ridi: #1a7cd9;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.7;
}

/* ── HEADER ── */
header {
  background: var(--bg);
  border-bottom: 2px solid var(--text);
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky; top: 0; z-index: 50;
}

.logo {
  font-family: var(--serif);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
  cursor: pointer;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.header-nav a {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  font-weight: 400;
  transition: color 0.15s;
  cursor: pointer;
}

.header-nav a:hover, .header-nav a.active { color: var(--text); }

/* ── SEARCH HERO ── */
.search-hero {
  background: var(--text);
  padding: 3rem 2.5rem;
  text-align: center;
}

.search-hero h1 {
  font-family: var(--serif);
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  color: var(--bg);
  font-weight: 400;
  margin-bottom: 0.4rem;
}

.search-hero p {
  font-size: 0.82rem;
  color: rgba(250,249,246,0.5);
  margin-bottom: 1.8rem;
}

.search-bar {
  display: flex;
  max-width: 640px;
  margin: 0 auto;
  gap: 0;
}

.search-bar input {
  flex: 1;
  background: var(--bg);
  border: none;
  padding: 0.85rem 1.2rem;
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--text);
  outline: none;
}

.search-bar input::placeholder { color: var(--dim); }

.search-bar select {
  background: var(--surface);
  border: none;
  border-left: 1px solid var(--border);
  padding: 0.85rem 0.8rem;
  font-family: var(--sans);
  font-size: 0.78rem;
  color: var(--muted);
  outline: none;
  cursor: pointer;
}

.search-bar button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.85rem 1.6rem;
  font-family: var(--sans);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 0.15s;
  font-weight: 400;
}

.search-bar button:hover { background: #a93226; }

.search-tags {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.search-tag {
  font-size: 0.7rem;
  color: rgba(250,249,246,0.45);
  border: 1px solid rgba(250,249,246,0.2);
  padding: 0.2rem 0.7rem;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}

.search-tag:hover {
  color: var(--bg);
  border-color: rgba(250,249,246,0.5);
}

/* ── SEARCH RESULTS ── */
.results-section {
  max-width: 1160px;
  margin: 0 auto;
  padding: 2rem 2.5rem;
  display: none;
}

.results-section.visible { display: block; }

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 2px solid var(--text);
  padding-top: 1rem;
  margin-bottom: 1.5rem;
}

.results-header h2 {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 600;
}

.results-count {
  font-size: 0.72rem;
  color: var(--muted);
}

.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.result-card {
  background: var(--card);
  padding: 1.4rem;
  cursor: pointer;
  transition: background 0.12s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.result-card:hover { background: var(--surface); }

.result-source {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dim);
  font-family: var(--sans);
}

.result-title {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
}

.result-desc {
  font-size: 0.76rem;
  line-height: 1.75;
  color: var(--muted);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.result-link {
  font-size: 0.65rem;
  color: var(--accent);
  margin-top: auto;
  padding-top: 0.5rem;
  text-decoration: none;
}

.loading-state {
  grid-column: 1/-1;
  padding: 4rem;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
}

.loading-dots {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-bottom: 0.8rem;
}

.loading-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  animation: pulse 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

/* ── REVIEW SECTION ── */
.review-section {
  max-width: 1160px;
  margin: 0 auto;
  padding: 2rem 2.5rem 6rem;
}

.section-heading {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  border-top: 2px solid var(--text);
  padding-top: 1.2rem;
  margin-bottom: 2rem;
}

.section-heading h2 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 600;
}

.section-count {
  font-size: 0.72rem;
  color: var(--muted);
}

.review-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.review-card {
  background: var(--card);
  padding: 1.8rem;
  cursor: pointer;
  transition: background 0.12s;
}

.review-card:hover { background: var(--surface); }

.rc-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.8rem;
}

.rc-genre {
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.rc-title {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 0.25rem;
}

.rc-author {
  font-size: 0.68rem;
  color: var(--muted);
  margin-bottom: 0.8rem;
}

.rc-excerpt {
  font-size: 0.8rem;
  line-height: 1.8;
  color: var(--muted);
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.rc-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  margin-top: 0.8rem;
}

.rc-tag {
  font-size: 0.58rem;
  color: var(--dim);
  border: 1px solid var(--border);
  padding: 0.1rem 0.45rem;
  border-radius: 2px;
}

/* ── MODAL ── */
.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,24,20,0.55);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  backdrop-filter: blur(4px);
}

.overlay.open { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  max-width: 580px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 2.5rem;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.modal-close {
  position: absolute; top: 1.2rem; right: 1.4rem;
  background: none; border: none;
  color: var(--muted); font-size: 1.2rem; cursor: pointer;
}

.modal-title {
  font-family: var(--serif);
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 0.5rem;
}

.modal-meta {
  display: flex;
  gap: 1.2rem;
  font-size: 0.74rem;
  color: var(--muted);
  flex-wrap: wrap;
  margin-bottom: 1.4rem;
}

.modal-hr { height: 1px; background: var(--border); margin: 1.2rem 0; }

.modal-body {
  font-family: var(--serif);
  font-size: 0.88rem;
  line-height: 2;
  color: var(--muted);
  white-space: pre-line;
}

/* ── MOBILE ── */
@media (max-width: 640px) {
  header { padding: 0 1.2rem; }
  .header-nav { display: none; }
  .search-hero { padding: 2.5rem 1.2rem; }
  .results-section, .review-section { padding-left: 1.2rem; padding-right: 1.2rem; }
  .review-grid { grid-template-columns: 1fr; }
  .modal { padding: 1.8rem 1.2rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="showPage('search')">아카이빙</div>
  <nav class="header-nav">
    <a class="active" onclick="showPage('search')">추천</a>
    <a onclick="showPage('reviews')">리뷰</a>
  </nav>
</header>

<!-- SEARCH HERO -->
<div class="search-hero" id="searchPage">
  <h1>어떤 웹소설을 찾고 있어요?</h1>
  <p>장르, 키워드, 취향을 입력하면 조아라 · 카카오페이지 · 네이버시리즈에서 찾아드릴게요</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="예: 빙의물 달달한 로판, 착각계 BL, 먼치킨 헌터물..." onkeydown="if(event.key==='Enter')doSearch()">
    <select id="platformSelect">
      <option value="">전체 플랫폼</option>
      <option value="조아라">조아라</option>
      <option value="카카오페이지">카카오페이지</option>
      <option value="네이버시리즈">네이버시리즈</option>
    </select>
    <button onclick="doSearch()">검색</button>
  </div>
  <div class="search-tags">
    <span class="search-tag" onclick="quickSearch('빙의물 로맨스판타지')">빙의물 로판</span>
    <span class="search-tag" onclick="quickSearch('착각계 BL')">착각계 BL</span>
    <span class="search-tag" onclick="quickSearch('먼치킨 헌터물')">먼치킨 헌터물</span>
    <span class="search-tag" onclick="quickSearch('회귀 재벌물')">회귀 재벌물</span>
    <span class="search-tag" onclick="quickSearch('달달한 로맨스 완결')">달달 완결</span>
    <span class="search-tag" onclick="quickSearch('대체역사 여주인공')">대체역사 여주</span>
    <span class="search-tag" onclick="quickSearch('일공다수 BL')">일공다수 BL</span>
    <span class="search-tag" onclick="quickSearch('패러디 원피스')">원피스 패러디</span>
  </div>
</div>

<!-- SEARCH RESULTS -->
<div class="results-section" id="resultsSection">
  <div class="results-header">
    <h2 id="resultsTitle">검색 결과</h2>
    <span class="results-count" id="resultsCount"></span>
  </div>
  <div class="results-grid" id="resultsGrid"></div>
</div>

<!-- REVIEW SECTION -->
<div class="review-section" id="reviewPage" style="display:none">
  <div class="section-heading">
    <h2>리뷰 아카이브</h2>
    <span class="section-count" id="reviewCount"></span>
  </div>
  <div class="review-grid" id="reviewGrid"></div>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <h2 class="modal-title" id="mTitle"></h2>
    <div class="modal-meta" id="mMeta"></div>
    <div class="modal-hr"></div>
    <div class="modal-body" id="mBody"></div>
    <div class="rc-tags" id="mTags" style="margin-top:1.2rem"></div>
  </div>
</div>

<script>
// ══════════════════════════════════════
//  리뷰 데이터 (실제 작성한 리뷰만)
// ══════════════════════════════════════
const reviews = [
  {
    id:1,
    title:"역시 곤란한가요? 이런 제가 딸이라면!",
    author:"델이야끼",
    platform:"조아라",
    genre:"패러디 (주술회전 x 헌터)",
    excerpt:`주술회전 x 헌터 크로스오버. 토우지 최애인 사람이 보증하는 주술회전 패러디 TOP5 작품. '가족'이 무엇인가를 다시 생각하게 만든다. 비극인 듯 해피엔딩. 완결 후 '아버지와 딸'이라는 존재에 대해 한참 멍하니 있었다.`,
    fullReview:`주술회전 x 헌터 패러디 중 단연 최애 작품. 젠인 토우지가 어느 날 자신의 딸이 생기면서 시작되는 가족물이다.

처음 제목 보고 괴리감이 컸다. 주인공 표정은 밝은데 "역시 곤란한가요? 이런 제가 딸이라면!"이라는 대사가 너무 무거워 보여서. 근데 완결까지 읽고 나서야 이 문장이 작품 전체를 관통하고 있다는 걸 알게 됐다.

'딸'이라는 역할과 '아버지'라는 역할은 모두가 처음 해보는 경험이다. 누가 가르쳐주지도 않고, 그래서 옆을 보고 배울 수밖에 없다. 하지만 그마저도 배울 수 없다면?

아버지와 딸이라기보다 동료에 가까웠던 둘의 관계가 어떻게 비극을 만들고, 또 어떻게 해피엔딩을 만드는지 — 직접 읽어봐야 한다.

토우지가 딸을 키우는 게 맞는지 틀린지 모르겠는데, 읽다 보면 이상하게 '어울리네'라고 생각하게 된다. 한달에 한 번은 정주행하는 작품.`,
    tags:["주술회전","헌터","토우지","가족물","해피엔딩"]
  },
  {
    id:2,
    title:"겹쳐지는 천 개의 수평선",
    author:"놉챠라떼",
    platform:"조아라",
    genre:"패러디 (원피스)",
    excerpt:`원피스 패러디 중 손꼽히는 명작. 루피만 살아남은 세계와 루피만 죽은 세계가 만났을 때의 이야기. 사흘에 한 번은 정주행한다. 읽는 내내 '애들아 행복해라'만 외쳤다.`,
    fullReview:`원피스 패러디의 정점이라 생각하는 작품. 루피만 살아남은 세계와 루피만 죽은 세계가 드레스로자에서 만나는 이야기.

루피가 생각을 한다. 막무가내가 아니다. 상황을 냉철하게 본다. 이게 왜 그렇게 됐는지 알게 되는 순간 눈물이 났다. 동료들 없는 루피가 혼자 살아남기 위해 익혔을 것들이 그냥 느껴졌다.

모두 없어져버린 루피를 본 동료들이 어떤 생각이 들었을지, 그리고 살아있는 동료들을 본 루피가 어떤 생각이 들었을지. 서로의 죽음이 트라우마가 된 상황에서 이걸 어떻게 풀어가는지가 이 작품의 전부다.

작가님 표현력이 진짜 입을 틀어막고 봐야 할 수준.

총평: 애들아 행복해라!`,
    tags:["원피스","루피","세계이동","명작","눈물주의"]
  },
  {
    id:3,
    title:"미아 찾기",
    author:"o하얀키위새",
    platform:"조아라",
    genre:"패러디 (센과 치히로 x 주술회전)",
    excerpt:`센과 치히로의 행방불명 x 주술회전 크로스오버. 물과 기름 같은 두 장르가 이렇게 잘 섞일 줄 몰랐다. 치히로가 해주사가 된다는 설정이 신의 한 수.`,
    fullReview:`지브리와 주술회전이 크로스오버 된다면? 그냥 캐릭터만 가져다 놓는 줄 알았다. 전혀 아니었다.

센과 치히로에서 신령계에 있었던 기억을 가진 치히로가 주술계에서 주령을 '퇴치'하는 게 아니라 '해주'하는 해주사가 된다는 설정 자체가 이미 창작이다. 두 작품의 분위기와 설정을 각각 뽑아서 새롭게 만들어낸 느낌.

주술회전 특유의 꿈도 희망도 없는 세계관에 지브리의 따뜻함이 들어오면 어떻게 될까? 그 답이 이 작품이다.

고죠 사토루가 치히로 덕질하면서 교복 커스텀해주는 장면은 진짜 소리 질렀다.`,
    tags:["주술회전","센과치히로","지브리","크로스오버","해주사"]
  },
  {
    id:4,
    title:"응애, 나 애기헌터. 키워줘!",
    author:"그리좋더라",

// ══════════════════════════════════════

function showPage(page) {
  const searchPage = document.getElementById('searchPage');
  const reviewPage = document.getElementById('reviewPage');
  const navLinks = document.querySelectorAll('.header-nav a');

  if (page === 'reviews') {
    reviewPage.style.display = 'block';
    searchPage.style.display = 'none';
    document.getElementById('resultsSection').classList.remove('visible');
    navLinks[0].classList.remove('active');
    navLinks[1].classList.add('active');
    renderReviews();
  } else {
    reviewPage.style.display = 'none';
    searchPage.style.display = 'block';
    navLinks[1].classList.remove('active');
    navLinks[0].classList.add('active');
  }
}

function quickSearch(query) {
  document.getElementById('searchInput').value = query;
  doSearch();
}

async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const platform = document.getElementById('platformSelect').value;
  if (!query) return;

  // 검색페이지로
  document.getElementById('reviewPage').style.display = 'none';
  document.getElementById('searchPage').style.display = 'block';

  const section = document.getElementById('resultsSection');
  const grid = document.getElementById('resultsGrid');
  const title = document.getElementById('resultsTitle');
  const count = document.getElementById('resultsCount');

  section.classList.add('visible');
  title.textContent = `"${query}" 검색 결과`;
  count.textContent = '';
  grid.innerHTML = `
    <div class="loading-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      검색 중...
    </div>
  `;

  // 검색어 조합
  let searchQuery = query;
  if (platform) searchQuery += ' ' + platform;
  else searchQuery += ' 웹소설';

  try {
    const res = await fetch(`/api/search?query=${encodeURIComponent(searchQuery)}`);
    const data = await res.json();

    const items = [...(data.blog || []), ...(data.web || [])];

    if (!items.length) {
      grid.innerHTML = '<div class="loading-state">검색 결과가 없습니다. 다른 키워드로 시도해보세요.</div>';
      return;
    }

    count.textContent = `${items.length}건`;
    grid.innerHTML = items.map(item => {
      const title = item.title.replace(/<[^>]*>/g, '');
      const desc = item.description ? item.description.replace(/<[^>]*>/g, '') : '';
      const source = item.bloggername || new URL(item.link).hostname.replace('www.','');
      return `
        <a class="result-card" href="${item.link}" target="_blank" rel="noopener noreferrer">
          <div class="result-source">${source}</div>
          <div class="result-title">${title}</div>
          <div class="result-desc">${desc}</div>
          <span class="result-link">바로가기 →</span>
        </a>
      `;
    }).join('');

  } catch (e) {
    grid.innerHTML = '<div class="loading-state">검색 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>';
  }
}

function renderReviews() {
  const grid = document.getElementById('reviewGrid');
  document.getElementById('reviewCount').textContent = `${reviews.length}편`;
  grid.innerHTML = reviews.map(r => `
    <div class="review-card" onclick="openReviewModal(${r.id})">
      <div class="rc-head">
        <span class="rc-genre">${r.genre} · ${r.platform}</span>
      </div>
      <div class="rc-title">${r.title}</div>
      <div class="rc-author">${r.author}</div>
      <div class="rc-excerpt">${r.excerpt}</div>
      <div class="rc-tags">${r.tags.map(t=>`<span class="rc-tag">#${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function openReviewModal(id) {
  const r = reviews.find(x => x.id === id);
  if (!r) return;
  document.getElementById('mTitle').textContent = r.title;
  document.getElementById('mMeta').innerHTML = `<span>${r.author}</span><span>${r.genre}</span><span style="color:var(--dim)">${r.platform}</span>`;
  document.getElementById('mBody').textContent = r.fullReview;
  document.getElementById('mTags').innerHTML = r.tags.map(t=>`<span class="rc-tag">#${t}</span>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
</script>
</body>
</html>
