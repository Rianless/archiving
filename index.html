<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아카이빙 — 웹소설 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --surface: #f2f0eb;
  --card: #ffffff;
  --border: #e8e3d8;
  --text: #1a1814;
  --muted: #7a7468;
  --dim: #c2bdb2;
  --accent: #c0392b;
  --sans: 'Noto Sans KR', sans-serif;
  --serif: 'Noto Serif KR', serif;
  --naver: #03c75a;
  --kakao: #f0a500;
  --joara: #e85d26;
  --ridi: #1a7cd9;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.7;
}

header {
  background: var(--bg);
  border-bottom: 2px solid var(--text);
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky; top: 0; z-index: 50;
}

.logo {
  font-family: var(--serif);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
  cursor: pointer;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.header-nav a {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  font-weight: 400;
  transition: color 0.15s;
  cursor: pointer;
}

.header-nav a:hover, .header-nav a.active { color: var(--text); }

.search-hero {
  background: var(--text);
  padding: 3rem 2.5rem;
  text-align: center;
}

.search-hero h1 {
  font-family: var(--serif);
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  color: var(--bg);
  font-weight: 400;
  margin-bottom: 0.4rem;
}

.search-hero p {
  font-size: 0.82rem;
  color: rgba(250,249,246,0.5);
  margin-bottom: 1.8rem;
}

.search-bar {
  display: flex;
  max-width: 640px;
  margin: 0 auto;
}

.search-bar input {
  flex: 1;
  background: var(--bg);
  border: none;
  padding: 0.85rem 1.2rem;
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--text);
  outline: none;
}

.search-bar input::placeholder { color: var(--dim); }

.search-bar select {
  background: var(--surface);
  border: none;
  border-left: 1px solid var(--border);
  padding: 0.85rem 0.8rem;
  font-family: var(--sans);
  font-size: 0.78rem;
  color: var(--muted);
  outline: none;
  cursor: pointer;
}

.search-bar button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.85rem 1.6rem;
  font-family: var(--sans);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 0.15s;
  font-weight: 400;
}

.search-bar button:hover { background: #a93226; }

/* 검색 결과 작품 카드 */
.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 1.2rem;
}
.work-card {
  display: flex;
  gap: 1rem;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 1rem;
  text-decoration: none;
  color: var(--text);
  transition: box-shadow 0.18s, transform 0.18s;
  align-items: flex-start;
}
.work-card:hover {
  box-shadow: 0 4px 20px rgba(0,0,0,0.10);
  transform: translateY(-2px);
}
.work-cover-wrap {
  flex-shrink: 0;
  width: 72px;
  height: 100px;
  border-radius: 6px;
  overflow: hidden;
  background: var(--tag-bg);
}
.work-cover {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.work-cover-fallback {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 11px;
  color: var(--text-muted);
  text-align: center;
  padding: 4px;
  line-height: 1.3;
  word-break: keep-all;
}
.work-info {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}
.work-platform {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.03em;
}
.work-title {
  font-size: 15px;
  font-weight: 700;
  line-height: 1.35;
  word-break: keep-all;
}
.work-author {
  font-size: 12px;
  color: var(--text-sub);
}
.work-desc {
  font-size: 12px;
  color: var(--text-sub);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
  margin-top: 0.2rem;
  flex: 1;
}
.work-link {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  margin-top: 0.4rem;
}
.work-type-badge {
  font-size: 10px;
  background: var(--tag-bg);
  color: var(--text-muted);
  border-radius: 4px;
  padding: 1px 6px;
  font-weight: 500;
}

/* 검색결과 작품 팝업 모달 */
.work-modal {
  max-width: 560px;
  width: 92%;
}
.work-modal-inner {
  display: flex;
  gap: 1.4rem;
  align-items: flex-start;
}
.work-modal-cover-wrap {
  flex-shrink: 0;
  width: 110px;
  height: 155px;
  border-radius: 8px;
  overflow: hidden;
  background: var(--tag-bg);
}
.work-modal-cover-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.work-modal-cover-fallback {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
  padding: 8px;
  word-break: keep-all;
  line-height: 1.4;
}
.work-modal-info {
  flex: 1;
  min-width: 0;
}
.work-modal-platform {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
}
.work-modal-title {
  font-size: 1.15rem;
  font-weight: 800;
  margin: 0.3rem 0 0.2rem;
  line-height: 1.35;
  word-break: keep-all;
}
.work-modal-author {
  font-size: 0.82rem;
  color: var(--text-sub);
  margin-bottom: 0.2rem;
}
.work-modal-desc {
  font-size: 0.85rem;
  line-height: 1.7;
  color: var(--text-sub);
  white-space: pre-wrap;
}
@media (max-width: 480px) {
  .work-modal-inner { flex-direction: column; }
  .work-modal-cover-wrap { width: 100%; height: 180px; }
}

.search-tags {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.search-tag {
  font-size: 0.7rem;
  color: rgba(250,249,246,0.45);
  border: 1px solid rgba(250,249,246,0.2);
  padding: 0.2rem 0.7rem;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}

.search-tag:hover { color: var(--bg); border-color: rgba(250,249,246,0.5); }

.results-section {
  max-width: 1160px;
  margin: 0 auto;
  padding: 2rem 2.5rem;
  display: none;
}

.results-section.visible { display: block; }

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 2px solid var(--text);
  padding-top: 1rem;
  margin-bottom: 1.5rem;
}

.results-header h2 {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 600;
}

.results-count { font-size: 0.72rem; color: var(--muted); }

.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.result-card {
  background: var(--card);
  padding: 1.4rem;
  cursor: pointer;
  transition: background 0.12s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.result-card:hover { background: var(--surface); }

.result-source {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dim);
}

.result-title {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
}

.result-desc {
  font-size: 0.76rem;
  line-height: 1.75;
  color: var(--muted);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.result-link {
  font-size: 0.65rem;
  color: var(--accent);
  margin-top: auto;
  padding-top: 0.5rem;
}

.loading-state {
  grid-column: 1/-1;
  padding: 4rem;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
}

.loading-dots {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-bottom: 0.8rem;
}

.loading-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  animation: pulse 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

.review-section {
  max-width: 1160px;
  margin: 0 auto;
  padding: 2rem 2.5rem 6rem;
}

.section-heading {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  border-top: 2px solid var(--text);
  padding-top: 1.2rem;
  margin-bottom: 2rem;
}

.section-heading h2 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 600;
}

.section-count { font-size: 0.72rem; color: var(--muted); }

.review-filter {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.platform-tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 0.8rem;
  flex-wrap: wrap;
}
.pt-btn {
  font-size: 0.78rem;
  font-weight: 600;
  padding: 0.35rem 1rem;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: var(--tag-bg);
  color: var(--text-sub);
  font-family: var(--sans);
  transition: all 0.15s;
}
.pt-btn:hover { background: var(--border); color: var(--text); }
.pt-btn.active { background: var(--text); color: var(--bg); }

.rf-btn {
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  color: var(--muted);
  border: 1px solid var(--border);
  background: none;
  padding: 0.25rem 0.75rem;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
  border-radius: 2px;
}

.rf-btn:hover { color: var(--text); border-color: var(--text); }
.rf-btn.active { color: var(--bg); background: var(--text); border-color: var(--text); }

.review-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.review-card {
  background: var(--card);
  padding: 1.8rem;
  cursor: pointer;
  transition: background 0.12s;
}

.review-card:hover { background: var(--surface); }

.rc-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.8rem;
}

.rc-genre {
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.rc-badge {
  font-size: 0.58rem;
  padding: 0.1rem 0.45rem;
  border-radius: 2px;
  font-weight: 500;
}

.badge-19 { background: rgba(192,57,43,0.1); color: var(--accent); }

.rc-title {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 0.25rem;
}

.rc-author { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.8rem; }

.rc-excerpt {
  font-size: 0.8rem;
  line-height: 1.8;
  color: var(--muted);
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.rc-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  margin-top: 0.8rem;
}

.rc-tag {
  font-size: 0.58rem;
  color: var(--dim);
  border: 1px solid var(--border);
  padding: 0.1rem 0.45rem;
  border-radius: 2px;
}

.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,24,20,0.55);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  backdrop-filter: blur(4px);
}

.overlay.open { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  max-width: 580px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 2.5rem;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.modal-close {
  position: absolute; top: 1.2rem; right: 1.4rem;
  background: none; border: none;
  color: var(--muted); font-size: 1.2rem; cursor: pointer;
}

.modal-title {
  font-family: var(--serif);
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 0.5rem;
}

.modal-meta {
  display: flex;
  gap: 1.2rem;
  font-size: 0.74rem;
  color: var(--muted);
  flex-wrap: wrap;
  margin-bottom: 1.4rem;
}

.modal-hr { height: 1px; background: var(--border); margin: 1.2rem 0; }

.modal-body {
  font-family: var(--serif);
  font-size: 0.88rem;
  line-height: 2;
  color: var(--muted);
  white-space: pre-line;
}

@media (max-width: 640px) {
  header { padding: 0 1.2rem; }
  .header-nav { display: none; }
  .search-hero { padding: 2.5rem 1.2rem; }
  .results-section, .review-section { padding-left: 1.2rem; padding-right: 1.2rem; }
  .review-grid { grid-template-columns: 1fr; }
  .modal { padding: 1.8rem 1.2rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="showPage('search')">아카이빙</div>
  <nav class="header-nav">
    <a class="active" onclick="showPage('search')">추천</a>
    <a onclick="showPage('reviews')">리뷰</a>
  </nav>
</header>

<div class="search-hero" id="searchPage">
  <h1>어떤 웹소설을 찾고 있어요?</h1>
  <p>장르, 키워드, 취향을 입력하면 조아라 · 카카오페이지 · 네이버시리즈에서 찾아드릴게요</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="예: 빙의물 달달한 로판, 착각계 BL, 먼치킨 헌터물..." onkeydown="if(event.key==='Enter')doSearch()">
    <select id="platformSelect">
      <option value="">전체 플랫폼</option>
      <option value="조아라">조아라</option>
      <option value="카카오페이지">카카오페이지</option>
      <option value="네이버시리즈">네이버시리즈</option>
    </select>
    <button onclick="doSearch()">검색</button>
  </div>
  <div class="search-tags">
    <span class="search-tag" onclick="quickSearch('빙의물 로맨스판타지')">빙의물 로판</span>
    <span class="search-tag" onclick="quickSearch('착각계 BL')">착각계 BL</span>
    <span class="search-tag" onclick="quickSearch('먼치킨 헌터물')">먼치킨 헌터물</span>
    <span class="search-tag" onclick="quickSearch('회귀 재벌물')">회귀 재벌물</span>
    <span class="search-tag" onclick="quickSearch('달달한 로맨스 완결')">달달 완결</span>
    <span class="search-tag" onclick="quickSearch('대체역사 여주인공')">대체역사 여주</span>
    <span class="search-tag" onclick="quickSearch('일공다수 BL')">일공다수 BL</span>
    <span class="search-tag" onclick="quickSearch('패러디 원피스')">원피스 패러디</span>
  </div>
</div>

<div class="results-section" id="resultsSection">
  <div class="results-header">
    <h2 id="resultsTitle">검색 결과</h2>
    <span class="results-count" id="resultsCount"></span>
  </div>
  <div class="results-grid" id="resultsGrid"></div>
</div>

<div class="review-section" id="reviewPage" style="display:none">
  <div class="section-heading">
    <h2>리뷰 아카이브</h2>
    <span class="section-count" id="reviewCount"></span>
  </div>
  <div class="platform-tabs">
    <button class="pt-btn active" onclick="filterPlatform('전체',this)">전체</button>
    <button class="pt-btn" onclick="filterPlatform('조아라',this)">조아라</button>
    <button class="pt-btn" onclick="filterPlatform('카카오페이지',this)">카카오페이지 스테이지</button>
  </div>
  <div class="review-filter">
    <button class="rf-btn active" onclick="filterReviews('전체',this)">전체</button>
    <button class="rf-btn" onclick="filterReviews('패러디',this)">패러디</button>
    <button class="rf-btn" onclick="filterReviews('BL',this)">BL</button>
    <button class="rf-btn" onclick="filterReviews('현대판타지',this)">현대판타지</button>
    <button class="rf-btn" onclick="filterReviews('로맨스판타지',this)">로맨스판타지</button>
    <button class="rf-btn" onclick="filterReviews('대체역사',this)">대체역사</button>
    <button class="rf-btn" onclick="filterReviews('로맨스',this)">로맨스</button>
  </div>
  <div class="review-grid" id="reviewGrid"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <h2 class="modal-title" id="mTitle"></h2>
    <div class="modal-meta" id="mMeta"></div>
    <div class="modal-hr"></div>
    <div class="modal-body" id="mBody"></div>
    <div class="rc-tags" id="mTags" style="margin-top:1.2rem"></div>
  </div>
</div>

<!-- 검색 결과 작품 팝업 -->
<div class="overlay" id="workOverlay" onclick="closeWorkModal(event)">
  <div class="modal work-modal">
    <button class="modal-close" onclick="closeWorkModalDirect()">×</button>
    <div class="work-modal-inner">
      <div class="work-modal-cover-wrap">
        <img id="wmCover" src="" alt="" onerror="this.style.display='none'">
        <div id="wmCoverFallback" class="work-modal-cover-fallback"></div>
      </div>
      <div class="work-modal-info">
        <span class="work-modal-platform" id="wmPlatform"></span>
        <h2 class="work-modal-title" id="wmTitle"></h2>
        <div class="work-modal-author" id="wmAuthor"></div>
        <div class="modal-hr" style="margin:1rem 0"></div>
        <div class="work-modal-desc" id="wmDesc"></div>
        <a id="wmLinkBtn" href="" target="_blank" rel="noopener noreferrer" style="display:none;margin-top:1rem;font-size:12px;color:var(--accent);font-weight:600;text-decoration:none"></a>
      </div>
    </div>
  </div>
</div>

<script>
const reviews = [
  {
    id:1, title:"[쿠로바스] ??", author:"은하수별빛",
    platform:"조아라", genre:"패러디", is19:false,

let currentFilter = '전체';

function showPage(page) {
  const searchPage = document.getElementById('searchPage');
  const reviewPage = document.getElementById('reviewPage');
  const navLinks = document.querySelectorAll('.header-nav a');

  if (page === 'reviews') {
    reviewPage.style.display = 'block';
    searchPage.style.display = 'none';
    document.getElementById('resultsSection').classList.remove('visible');
    navLinks[0].classList.remove('active');
    navLinks[1].classList.add('active');
    renderReviews('전체');
  } else {
    reviewPage.style.display = 'none';
    searchPage.style.display = 'block';
    navLinks[1].classList.remove('active');
    navLinks[0].classList.add('active');
  }
}

let currentPlatform = '전체';

// 플랫폼별 장르 목록
const platformGenres = {
  '전체': ['전체','패러디','BL','현대판타지','로맨스판타지','대체역사','로맨스'],
  '조아라': ['전체','패러디','BL','현대판타지','로맨스판타지','대체역사','로맨스'],
  '카카오페이지': ['전체','판타지','현대판타지'],
};

function filterPlatform(platform, btn) {
  currentPlatform = platform;
  document.querySelectorAll('.pt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = '전체';

  // 장르 버튼 동적 렌더링
  const genres = platformGenres[platform] || platformGenres['전체'];
  const filterDiv = document.querySelector('.review-filter');
  filterDiv.innerHTML = genres.map((g, i) =>
    `<button class="rf-btn${i === 0 ? ' active' : ''}" onclick="filterReviews('${g}',this)">${g}</button>`
  ).join('');

  renderReviews('전체');
}

function filterReviews(genre, btn) {
  currentFilter = genre;
  document.querySelectorAll('.rf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReviews(genre);
}

function renderReviews(filter) {
  let list = reviews;
  if (currentPlatform !== '전체') list = list.filter(r => r.platform === currentPlatform);
  if (filter !== '전체') list = list.filter(r => r.genre === filter);
  document.getElementById('reviewCount').textContent = `${list.length}편`;
  const grid = document.getElementById('reviewGrid');
  grid.innerHTML = list.map(r => `
    <div class="review-card" onclick="openReviewModal(${r.id})">
      <div class="rc-head">
        <span class="rc-genre">${r.genreLabel || r.genre} · ${r.platform}</span>
        ${r.is19 ? '<span class="rc-badge badge-19">19+</span>' : ''}
      </div>
      <div class="rc-title">${r.title}</div>
      <div class="rc-author">${r.author}</div>
      <div class="rc-excerpt">${r.excerpt||""}</div>
      <div class="rc-tags">${(r.tags||[]).map(t=>`<span class="rc-tag">#${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function quickSearch(query) {
  document.getElementById('searchInput').value = query;
  doSearch();
}

async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const platform = document.getElementById('platformSelect').value;
  if (!query) return;

  document.getElementById('reviewPage').style.display = 'none';
  document.getElementById('searchPage').style.display = 'block';

  const section = document.getElementById('resultsSection');
  const grid = document.getElementById('resultsGrid');
  const title = document.getElementById('resultsTitle');
  const count = document.getElementById('resultsCount');

  section.classList.add('visible');
  title.textContent = `"${query}" 검색 결과`;
  count.textContent = '';
  grid.innerHTML = `
    <div class="loading-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      작품 찾는 중...
    </div>
  `;

  try {
    const params = new URLSearchParams({ query });
    if (platform) params.append('platform', platform);

    const res = await fetch(`/api/search?${params}`);
    const data = await res.json();
    const results = data.results || [];

    if (!results.length) {
      grid.innerHTML = '<div class="loading-state">검색 결과가 없습니다. 다른 키워드로 시도해보세요.</div>';
      return;
    }

    const platformColors = {
      '조아라': '#7c4dff',
      '카카오페이지': '#d4a800',
      '네이버시리즈': '#03c75a',
      '리디북스': '#1f8ce6',
    };

    count.textContent = `${results.length}개`;
    window._searchResults = results;

    grid.innerHTML = results.map((item, idx) => {
      const color = platformColors[item.platform] || '#888';
      const coverHtml = item.cover
        ? `<img class="work-cover" src="${item.cover}" alt="${item.title}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
        : '';
      const fallbackHtml = `<div class="work-cover-fallback" style="${item.cover ? 'display:none' : ''}">${item.title.slice(0,4)}</div>`;
      const badge = item.type === 'blog' ? `<span class="work-type-badge">추천글</span>` : '';

      return `
        <div class="work-card" onclick="openWorkModal(${idx})" style="cursor:pointer">
          <div class="work-cover-wrap">
            ${coverHtml}
            ${fallbackHtml}
          </div>
          <div class="work-info">
            <div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap">
              <span class="work-platform" style="color:${color}">${item.platform}</span>
              ${badge}
            </div>
            <div class="work-title">${item.title}</div>
            ${item.author ? `<div class="work-author">${item.author}</div>` : ''}
            <div class="work-desc">${item.description}</div>
          </div>
        </div>
      `;
    }).join('');
  } catch (e) {
    grid.innerHTML = '<div class="loading-state">검색 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>';
  }
}

function openReviewModal(id) {
  const r = reviews.find(x => x.id === Number(id));
  if (!r) { console.error('리뷰 못 찾음 id:', id, '타입:', typeof id); return; }
  document.getElementById('mTitle').textContent = r.title;
  document.getElementById('mMeta').innerHTML = `
    <span>${r.author}</span>
    <span>${r.genre}</span>
    <span style="color:var(--dim)">${r.platform}</span>
    ${r.is19 ? '<span style="color:var(--accent)">19+</span>' : ''}
  `;
  document.getElementById('mBody').textContent = r.fullReview || r.excerpt || '리뷰 내용이 없습니다.';
  document.getElementById('mTags').innerHTML = (r.tags||[]).map(t=>`<span class="rc-tag">#${t}</span>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }

function openWorkModal(idx) {
  const item = (window._searchResults || [])[idx];
  if (!item) return;

  const platformColors = {
    '조아라': '#7c4dff',
    '카카오페이지': '#d4a800',
    '네이버시리즈': '#03c75a',
    '리디북스': '#1f8ce6',
    '웹소설': '#888',
  };

  const color = platformColors[item.platform] || '#888';

  document.getElementById('wmPlatform').textContent = item.platform;
  document.getElementById('wmPlatform').style.color = color;
  document.getElementById('wmTitle').textContent = item.title;

  // 작가 + 출판사 + 출판일
  let meta = '';
  if (item.author) meta += item.author;
  if (item.publisher) meta += (meta ? ' · ' : '') + item.publisher;
  if (item.pubdate && item.pubdate.length === 8) {
    const d = item.pubdate;
    meta += (meta ? ' · ' : '') + `${d.slice(0,4)}.${d.slice(4,6)}.${d.slice(6,8)}`;
  }
  document.getElementById('wmAuthor').textContent = meta;
  document.getElementById('wmDesc').textContent = item.description || '작품 소개가 없습니다.';

  const img = document.getElementById('wmCover');
  const fallback = document.getElementById('wmCoverFallback');
  if (item.cover) {
    img.src = item.cover;
    img.style.display = 'block';
    fallback.style.display = 'none';
    fallback.textContent = '';
  } else {
    img.style.display = 'none';
    fallback.style.display = 'flex';
    fallback.textContent = item.title.slice(0, 6);
  }

  // 블로그 타입이면 원문 보기 버튼 표시
  const linkBtn = document.getElementById('wmLinkBtn');
  if (item.link) {
    linkBtn.href = item.link;
    linkBtn.style.display = 'inline-block';
    linkBtn.textContent = item.type === 'blog' ? '블로그 원문 보기 →' : '작품 페이지 보기 →';
  } else {
    linkBtn.style.display = 'none';
  }

  document.getElementById('workOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeWorkModal(e) { if (e.target === document.getElementById('workOverlay')) closeWorkModalDirect(); }
function closeWorkModalDirect() { document.getElementById('workOverlay').classList.remove('open'); document.body.style.overflow = ''; }
</script>
