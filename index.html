<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아카이빙 — 웹소설 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;600&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf9f6;
  --surface: #f2f0eb;
  --card: #ffffff;
  --border: #e8e3d8;
  --text: #1a1814;
  --muted: #7a7468;
  --dim: #c2bdb2;
  --accent: #c0392b;
  --sans: 'Noto Sans KR', sans-serif;
  --serif: 'Noto Serif KR', serif;
  --naver: #03c75a;
  --kakao: #f0a500;
  --joara: #e85d26;
  --ridi: #1a7cd9;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-weight: 300;
  line-height: 1.7;
}

header {
  background: var(--bg);
  border-bottom: 2px solid var(--text);
  padding: 0 2.5rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky; top: 0; z-index: 50;
}

.logo {
  font-family: var(--serif);
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text);
  letter-spacing: 0.04em;
  cursor: pointer;
}

.header-nav {
  display: flex;
  align-items: center;
  gap: 2rem;
}

.header-nav a {
  font-size: 0.75rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  font-weight: 400;
  transition: color 0.15s;
  cursor: pointer;
}

.header-nav a:hover, .header-nav a.active { color: var(--text); }

.search-hero {
  background: var(--text);
  padding: 3rem 2.5rem;
  text-align: center;
}

.search-hero h1 {
  font-family: var(--serif);
  font-size: clamp(1.6rem, 3vw, 2.4rem);
  color: var(--bg);
  font-weight: 400;
  margin-bottom: 0.4rem;
}

.search-hero p {
  font-size: 0.82rem;
  color: rgba(250,249,246,0.5);
  margin-bottom: 1.8rem;
}

.search-bar {
  display: flex;
  max-width: 640px;
  margin: 0 auto;
}

.search-bar input {
  flex: 1;
  background: var(--bg);
  border: none;
  padding: 0.85rem 1.2rem;
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 300;
  color: var(--text);
  outline: none;
}

.search-bar input::placeholder { color: var(--dim); }

.search-bar select {
  background: var(--surface);
  border: none;
  border-left: 1px solid var(--border);
  padding: 0.85rem 0.8rem;
  font-family: var(--sans);
  font-size: 0.78rem;
  color: var(--muted);
  outline: none;
  cursor: pointer;
}

.search-bar button {
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.85rem 1.6rem;
  font-family: var(--sans);
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  cursor: pointer;
  transition: background 0.15s;
  font-weight: 400;
}

.search-bar button:hover { background: #a93226; }

.search-tags {
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 1rem;
}

.search-tag {
  font-size: 0.7rem;
  color: rgba(250,249,246,0.45);
  border: 1px solid rgba(250,249,246,0.2);
  padding: 0.2rem 0.7rem;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}

.search-tag:hover { color: var(--bg); border-color: rgba(250,249,246,0.5); }

.results-section {
  max-width: 1160px;
  margin: 0 auto;
  padding: 2rem 2.5rem;
  display: none;
}

.results-section.visible { display: block; }

.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-top: 2px solid var(--text);
  padding-top: 1rem;
  margin-bottom: 1.5rem;
}

.results-header h2 {
  font-family: var(--serif);
  font-size: 1.2rem;
  font-weight: 600;
}

.results-count { font-size: 0.72rem; color: var(--muted); }

.results-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.result-card {
  background: var(--card);
  padding: 1.4rem;
  cursor: pointer;
  transition: background 0.12s;
  text-decoration: none;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}

.result-card:hover { background: var(--surface); }

.result-source {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--dim);
}

.result-title {
  font-family: var(--serif);
  font-size: 0.95rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.35;
}

.result-desc {
  font-size: 0.76rem;
  line-height: 1.75;
  color: var(--muted);
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.result-link {
  font-size: 0.65rem;
  color: var(--accent);
  margin-top: auto;
  padding-top: 0.5rem;
}

.loading-state {
  grid-column: 1/-1;
  padding: 4rem;
  text-align: center;
  color: var(--muted);
  font-size: 0.85rem;
}

.loading-dots {
  display: flex;
  gap: 4px;
  justify-content: center;
  margin-bottom: 0.8rem;
}

.loading-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--dim);
  animation: pulse 1.2s ease-in-out infinite;
}

.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse { 0%,80%,100%{transform:scale(0.6);opacity:0.4} 40%{transform:scale(1);opacity:1} }

.review-section {
  max-width: 1160px;
  margin: 0 auto;
  padding: 2rem 2.5rem 6rem;
}

.section-heading {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  border-top: 2px solid var(--text);
  padding-top: 1.2rem;
  margin-bottom: 2rem;
}

.section-heading h2 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 600;
}

.section-count { font-size: 0.72rem; color: var(--muted); }

.review-filter {
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}

.rf-btn {
  font-size: 0.7rem;
  letter-spacing: 0.05em;
  color: var(--muted);
  border: 1px solid var(--border);
  background: none;
  padding: 0.25rem 0.75rem;
  cursor: pointer;
  font-family: var(--sans);
  transition: all 0.15s;
  border-radius: 2px;
}

.rf-btn:hover { color: var(--text); border-color: var(--text); }
.rf-btn.active { color: var(--bg); background: var(--text); border-color: var(--text); }

.review-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1px;
  background: var(--border);
  border: 1px solid var(--border);
}

.review-card {
  background: var(--card);
  padding: 1.8rem;
  cursor: pointer;
  transition: background 0.12s;
}

.review-card:hover { background: var(--surface); }

.rc-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.8rem;
}

.rc-genre {
  font-size: 0.62rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--muted);
}

.rc-badge {
  font-size: 0.58rem;
  padding: 0.1rem 0.45rem;
  border-radius: 2px;
  font-weight: 500;
}

.badge-19 { background: rgba(192,57,43,0.1); color: var(--accent); }

.rc-title {
  font-family: var(--serif);
  font-size: 1.05rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 0.25rem;
}

.rc-author { font-size: 0.68rem; color: var(--muted); margin-bottom: 0.8rem; }

.rc-excerpt {
  font-size: 0.8rem;
  line-height: 1.8;
  color: var(--muted);
  display: -webkit-box;
  -webkit-line-clamp: 4;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.rc-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.25rem;
  margin-top: 0.8rem;
}

.rc-tag {
  font-size: 0.58rem;
  color: var(--dim);
  border: 1px solid var(--border);
  padding: 0.1rem 0.45rem;
  border-radius: 2px;
}

.overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(26,24,20,0.55);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  backdrop-filter: blur(4px);
}

.overlay.open { display: flex; }

.modal {
  background: var(--card);
  border: 1px solid var(--border);
  max-width: 580px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  padding: 2.5rem;
  position: relative;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}

.modal-close {
  position: absolute; top: 1.2rem; right: 1.4rem;
  background: none; border: none;
  color: var(--muted); font-size: 1.2rem; cursor: pointer;
}

.modal-title {
  font-family: var(--serif);
  font-size: 1.7rem;
  font-weight: 600;
  color: var(--text);
  line-height: 1.2;
  margin-bottom: 0.5rem;
}

.modal-meta {
  display: flex;
  gap: 1.2rem;
  font-size: 0.74rem;
  color: var(--muted);
  flex-wrap: wrap;
  margin-bottom: 1.4rem;
}

.modal-hr { height: 1px; background: var(--border); margin: 1.2rem 0; }

.modal-body {
  font-family: var(--serif);
  font-size: 0.88rem;
  line-height: 2;
  color: var(--muted);
  white-space: pre-line;
}

@media (max-width: 640px) {
  header { padding: 0 1.2rem; }
  .header-nav { display: none; }
  .search-hero { padding: 2.5rem 1.2rem; }
  .results-section, .review-section { padding-left: 1.2rem; padding-right: 1.2rem; }
  .review-grid { grid-template-columns: 1fr; }
  .modal { padding: 1.8rem 1.2rem; }
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="showPage('search')">아카이빙</div>
  <nav class="header-nav">
    <a class="active" onclick="showPage('search')">추천</a>
    <a onclick="showPage('reviews')">리뷰</a>
  </nav>
</header>

<div class="search-hero" id="searchPage">
  <h1>어떤 웹소설을 찾고 있어요?</h1>
  <p>장르, 키워드, 취향을 입력하면 조아라 · 카카오페이지 · 네이버시리즈에서 찾아드릴게요</p>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="예: 빙의물 달달한 로판, 착각계 BL, 먼치킨 헌터물..." onkeydown="if(event.key==='Enter')doSearch()">
    <select id="platformSelect">
      <option value="">전체 플랫폼</option>
      <option value="조아라">조아라</option>
      <option value="카카오페이지">카카오페이지</option>
      <option value="네이버시리즈">네이버시리즈</option>
    </select>
    <button onclick="doSearch()">검색</button>
  </div>
  <div class="search-tags">
    <span class="search-tag" onclick="quickSearch('빙의물 로맨스판타지')">빙의물 로판</span>
    <span class="search-tag" onclick="quickSearch('착각계 BL')">착각계 BL</span>
    <span class="search-tag" onclick="quickSearch('먼치킨 헌터물')">먼치킨 헌터물</span>
    <span class="search-tag" onclick="quickSearch('회귀 재벌물')">회귀 재벌물</span>
    <span class="search-tag" onclick="quickSearch('달달한 로맨스 완결')">달달 완결</span>
    <span class="search-tag" onclick="quickSearch('대체역사 여주인공')">대체역사 여주</span>
    <span class="search-tag" onclick="quickSearch('일공다수 BL')">일공다수 BL</span>
    <span class="search-tag" onclick="quickSearch('패러디 원피스')">원피스 패러디</span>
  </div>
</div>

<div class="results-section" id="resultsSection">
  <div class="results-header">
    <h2 id="resultsTitle">검색 결과</h2>
    <span class="results-count" id="resultsCount"></span>
  </div>
  <div class="results-grid" id="resultsGrid"></div>
</div>

<div class="review-section" id="reviewPage" style="display:none">
  <div class="section-heading">
    <h2>리뷰 아카이브</h2>
    <span class="section-count" id="reviewCount"></span>
  </div>
  <div class="review-filter">
    <button class="rf-btn active" onclick="filterReviews('전체',this)">전체</button>
    <button class="rf-btn" onclick="filterReviews('패러디',this)">패러디</button>
    <button class="rf-btn" onclick="filterReviews('BL',this)">BL</button>
    <button class="rf-btn" onclick="filterReviews('현대판타지',this)">현대판타지</button>
    <button class="rf-btn" onclick="filterReviews('로맨스판타지',this)">로맨스판타지</button>
    <button class="rf-btn" onclick="filterReviews('대체역사',this)">대체역사</button>
    <button class="rf-btn" onclick="filterReviews('로맨스',this)">로맨스</button>
  </div>
  <div class="review-grid" id="reviewGrid"></div>
</div>

<div class="overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">×</button>
    <h2 class="modal-title" id="mTitle"></h2>
    <div class="modal-meta" id="mMeta"></div>
    <div class="modal-hr"></div>
    <div class="modal-body" id="mBody"></div>
    <div class="rc-tags" id="mTags" style="margin-top:1.2rem"></div>
  </div>
</div>

<script>
const reviews = [
  {
    id:1, title:"[쿠로바스] ??", author:"은하수별빛",
    platform:"조아라", genre:"패러디", is19:false,
    excerpt:`쿠로코의 농구 패러디. 내가 처음 읽은 쿠로바스 패러디 작품이자 '착각계'라는 키워드를 알게 해준 작품. 아카시 세이쥬로에 빙의한 소시민의 이야기. 지금 보면 오글거리는 부분도 있지만 반전도 있고 원작까지 전부 풀어줘서 쿠로바스 패러디 중 가장 좋아하는 작품이다.`,
    fullReview:`쿠로코의 농구 패러디 작품 중 가장 처음으로 읽은 작품이자 지금까지도 가장 좋아하는 작품이다.

자칭 엑스트라A씨가 쿠로코의 농구 속 최종보스 아카시 세이쥬로에 빙의하면서 시작된다. 테이코 중학교 시절도 아니고 완전 어렸을 때부터 시작한다는 게 포인트.

이 작품은 나에게 '착각계'라는 키워드를 알게 해준 작품이다. 이때 착각계의 참맛을 알아서 키워드 검색으로 주구장창 읽었던 때가 있었다.

어떤 부분이 재밌고 아쉽다는 분석보다는 그때 그 시절을 다시 떠올리게 하는 작품이라는 걸 말하고 싶다. 지금 보면 오글거리는 부분도 있지만 반전도 있고 중학생에서 끝나지 않고 원작까지 전부 풀어줘서 정말 좋았다.

기적의 세대의 캡틴 아카시 세이쥬로에 빙의한 소시민이 나름대로 아카시 코스프레를 하면서 친구도 만들고 농구도 하는 이야기. 쿠로바스를 본진으로 삼고 있다면 바로 가서 보시면 됩니다.`,
    tags:["쿠로바스","쿠로코의농구","빙의","착각계","아카시"]
  },
  {
    id:2, title:"[오페라의 유령] 19세기 로커를 위한 안내서", author:"영백",
    platform:"조아라", genre:"패러디", is19:false,
    excerpt:`오페라의 유령 x 헤비메탈 로커 크로스오버. 조아라 생활 N년 만에 처음 보는 오유 패러디. 19세기 남자 에릭이 21세기 여자 바냐를 만나서 서서히 변하는 과정이 재밌다. 30편 단편인데 외전만 만개 써주셨으면.`,
    fullReview:`조아라 생활 N년 만에 보는 오페라의 유령 패러디 작품. 보자마자 '이건 더 많은 사람들이 읽어야 해!'를 외치며 리뷰를 쓰게 됐다.

오페라의 유령을 모르는 사람도 볼 수 있다. 지하에 사는 에릭, 얼굴에 흉터 있어서 가면 쓰고 다닌다, 오페라 극장 관계자들을 협박할 때도 있다 — 이것만 알면 된다.

합주실 문을 열었더니 19세기 프랑스 파리 오페라 극장 지하가 나온 21세기 여자 기타리스트 바냐. 살려달라며 혼신의 헤비메탈 연주를 펼치는 바냐, 그 연주에 올가미를 찾는 에릭이 너무 웃겼다.

헤비메탈을 처음 들은 에릭의 반응은 당연하다. 오페라만 듣다가 헤비메탈을 들으면...

자고로 음침캐가 햇살캐를 못 이기는 것처럼, 에릭은 바냐를 만나 변할 수밖에 없다. 마음을 표현하는 방식이 19세기 프랑스 남자답게 달콤한 설탕공예 하트를 만들어주는 것 같은 에릭과 내가 좋아하는 거야! 직진인 바냐의 케미가 압권이다.`,
    tags:["오페라의유령","패러디","시간이동","로코물","달달"]
  },
  {
    id:3, title:"응애, 나 애기헌터. 키워줘!", author:"그리좋더라",
    platform:"조아라", genre:"현대판타지", is19:false,
    excerpt:`헌터물 + 성좌물 + 육아물의 조합. 성좌들이 착하고 멍충미가 있어서 신선하다. 치킨 먹고 좋아하는 성좌가 귀여워서 보게 됨. 가볍게 읽기 좋은 작품.`,
    fullReview:`전독시로 성좌물을 처음 배운 사람으로서 이 작품은 좀 다르다.

let currentFilter = '전체';

function showPage(page) {
  const searchPage = document.getElementById('searchPage');
  const reviewPage = document.getElementById('reviewPage');
  const navLinks = document.querySelectorAll('.header-nav a');

  if (page === 'reviews') {
    reviewPage.style.display = 'block';
    searchPage.style.display = 'none';
    document.getElementById('resultsSection').classList.remove('visible');
    navLinks[0].classList.remove('active');
    navLinks[1].classList.add('active');
    renderReviews('전체');
  } else {
    reviewPage.style.display = 'none';
    searchPage.style.display = 'block';
    navLinks[1].classList.remove('active');
    navLinks[0].classList.add('active');
  }
}

function filterReviews(genre, btn) {
  currentFilter = genre;
  document.querySelectorAll('.rf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderReviews(genre);
}

function renderReviews(filter) {
  const list = filter === '전체' ? reviews : reviews.filter(r => r.genre.includes(filter));
  document.getElementById('reviewCount').textContent = `${list.length}편`;
  const grid = document.getElementById('reviewGrid');
  grid.innerHTML = list.map(r => `
    <div class="review-card" onclick="openReviewModal(${r.id})">
      <div class="rc-head">
        <span class="rc-genre">${r.genre} · ${r.platform}</span>
        ${r.is19 ? '<span class="rc-badge badge-19">19+</span>' : ''}
      </div>
      <div class="rc-title">${r.title}</div>
      <div class="rc-author">${r.author}</div>
      <div class="rc-excerpt">${r.excerpt}</div>
      <div class="rc-tags">${r.tags.map(t=>`<span class="rc-tag">#${t}</span>`).join('')}</div>
    </div>
  `).join('');
}

function quickSearch(query) {
  document.getElementById('searchInput').value = query;
  doSearch();
}

async function doSearch() {
  const query = document.getElementById('searchInput').value.trim();
  const platform = document.getElementById('platformSelect').value;
  if (!query) return;

  document.getElementById('reviewPage').style.display = 'none';
  document.getElementById('searchPage').style.display = 'block';

  const section = document.getElementById('resultsSection');
  const grid = document.getElementById('resultsGrid');
  const title = document.getElementById('resultsTitle');
  const count = document.getElementById('resultsCount');

  section.classList.add('visible');
  title.textContent = `"${query}" 검색 결과`;
  count.textContent = '';
  grid.innerHTML = `
    <div class="loading-state">
      <div class="loading-dots"><span></span><span></span><span></span></div>
      검색 중...
    </div>
  `;

  let searchQuery = query;
  if (platform) searchQuery += ' ' + platform;
  else searchQuery += ' 웹소설';

  try {
    const res = await fetch(`/api/search?query=${encodeURIComponent(searchQuery)}`);
    const data = await res.json();
    const items = [...(data.blog || []), ...(data.web || [])];

    if (!items.length) {
      grid.innerHTML = '<div class="loading-state">검색 결과가 없습니다. 다른 키워드로 시도해보세요.</div>';
      return;
    }

    count.textContent = `${items.length}건`;
    grid.innerHTML = items.map(item => {
      const t = item.title.replace(/<[^>]*>/g, '');
      const d = item.description ? item.description.replace(/<[^>]*>/g, '') : '';
      const src = item.bloggername || (() => { try { return new URL(item.link).hostname.replace('www.',''); } catch { return ''; } })();
      return `
        <a class="result-card" href="${item.link}" target="_blank" rel="noopener noreferrer">
          <div class="result-source">${src}</div>
          <div class="result-title">${t}</div>
          <div class="result-desc">${d}</div>
          <span class="result-link">바로가기 →</span>
        </a>
      `;
    }).join('');
  } catch (e) {
    grid.innerHTML = '<div class="loading-state">검색 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.</div>';
  }
}

function openReviewModal(id) {
  const r = reviews.find(x => x.id === id);
  if (!r) return;
  document.getElementById('mTitle').textContent = r.title;
  document.getElementById('mMeta').innerHTML = `
    <span>${r.author}</span>
    <span>${r.genre}</span>
    <span style="color:var(--dim)">${r.platform}</span>
    ${r.is19 ? '<span style="color:var(--accent)">19+</span>' : ''}
  `;
  document.getElementById('mBody').textContent = r.fullReview;
  document.getElementById('mTags').innerHTML = r.tags.map(t=>`<span class="rc-tag">#${t}</span>`).join('');
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('overlay').classList.remove('open'); document.body.style.overflow = ''; }
</script>
